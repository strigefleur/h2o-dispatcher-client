name: Build and publish update feed (Velopack)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish App
        run: dotnet publish .\Felweed.csproj -c Release -r win-x64 --self-contained true -o .\publish /p:GITHUB_ACTIONS=true

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Pack Velopack feed
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart("v")
          vpk pack `
            --packId "Felweed" `
            --packTitle "Felweed" `
            --packVersion $ver `
            --packDir ".\publish" `
            --outputDir ".\site\felweed"

      - uses: actions/upload-artifact@v4
        with:
          name: pages-site
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Site
        uses: actions/download-artifact@v4
        with:
          name: pages-site
          path: site

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4